name: Crypto News Poster

on:
  schedule:
    # Times below are UTC. Myanmar Time (MMT) = UTC + 6:30
    # Primary trigger + 2 backup times per slot, in case GitHub skips a
    # scheduled run under load (known GitHub Actions limitation).
    - cron: '17 0,5,12 * * *'   # primary  (~6:47 / 11:47 / 18:47 MMT)
    - cron: '22 0,5,12 * * *'   # backup +5 min
    - cron: '37 0,5,12 * * *'   # backup +20 min
  repository_dispatch:
    types: [trigger-crypto-post]   # allows external cron service to trigger
  workflow_dispatch: {}            # allows manual "Run workflow" testing

permissions:
  contents: write

jobs:
  post-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r crypto-news-poster/requirements.txt

      - name: Run news fetch & post script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CRYPTOPANIC_TOKEN: ${{ secrets.CRYPTOPANIC_TOKEN }}
        run: python crypto-news-poster/fetch_and_post.py

      - name: Commit updated history file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add crypto-news-poster/posted_history.json
          git diff --cached --quiet || git commit -m "Update posted news history [skip ci]"
          git push
