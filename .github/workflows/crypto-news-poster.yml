name: Crypto News Poster

on:
  schedule:
    - cron: '17 0,5,12 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r crypto-news-poster/requirements.txt

      - name: Run news fetch & post script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CRYPTOPANIC_TOKEN: ${{ secrets.CRYPTOPANIC_TOKEN }}
        run: python crypto-news-poster/fetch_and_post.py

      - name: Commit updated history file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add crypto-news-poster/posted_history.json
          git diff --cached --quiet || git commit -m "Update posted news history [skip ci]"
          git push
